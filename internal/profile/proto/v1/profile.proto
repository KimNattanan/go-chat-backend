syntax = "proto3";

package profile.v1;

option go_package = "internal/profile/proto/v1";

import "google/protobuf/timestamp.proto";

// Models

message Profile {
  string user_id = 1;
  string email = 2;
  string name = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
}

// Requests

message FindProfileRequest {
  string user_id = 1;
}

message CreateProfileRequest {
  string user_id = 1;
  string email = 2;
  string name = 3;
}

message PatchProfileRequest {
  string user_id = 1;
  string name = 3;
}

message DeleteProfileRequest {
  string user_id = 1;
}

// Responses

message ProfileResponse {
  Profile profile = 1;
}

message DeleteProfileResponse {
  string message = 1;
}

// Services

service ProfileService {
  rpc FindProfile(FindProfileRequest) returns (ProfileResponse);
  rpc CreateProfile(CreateProfileRequest) returns (ProfileResponse);
  rpc PatchProfile(PatchProfileRequest) returns (ProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);
}

